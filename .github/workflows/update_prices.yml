name: Update Stock Prices

on:
  schedule:
    - cron: '30 22 * * 1-5'   # 07:30 KST weekdays (22:30 UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch prices
        run: python scripts/fetch_prices.py

      - name: Commit prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "auto: update prices.json $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
