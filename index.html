<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jin's Portfolio v5</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: #0b1220; color: #e4e7ef; padding: 20px; min-height: 100vh;
  }
  .wrap { max-width: 1400px; margin: 0 auto; }
  .hdr { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
  .hdr h1 { font-size: 20px; font-weight: 700; }
  .hdr .sub { color: #8ea3c7; font-size: 13px; }
  .tabs {
    display: flex; gap: 6px; margin-bottom: 16px;
    background: #111a2d; padding: 4px; border-radius: 10px; width: fit-content;
  }
  .tab {
    background: transparent; border: none; padding: 8px 16px;
    cursor: pointer; font-size: 13px; font-weight: 500;
    color: #8ea3c7; border-radius: 7px; transition: all 0.15s; font-family: inherit;
  }
  .tab:hover { color: #e4e7ef; }
  .tab.active { background: #1e2a44; color: #fff; }
  .panel { display: none; }
  .panel.active { display: block; animation: fade 0.2s; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .card { background: #0f1a2e; border: 1px solid #1a2340; border-radius: 8px; padding: 12px; }
  .chart-box { position: relative; height: 560px; }
  .chart-scroll { width: 100%; overflow-x: auto; }
  .chart-scroll::-webkit-scrollbar { height: 8px; }
  .chart-scroll::-webkit-scrollbar-track { background: #0b1424; border-radius: 4px; }
  .chart-scroll::-webkit-scrollbar-thumb { background: #2d3a5f; border-radius: 4px; }
  .chart-scroll::-webkit-scrollbar-thumb:hover { background: #3d4e7a; }
  .chart-box-wide { position: relative; height: 580px; min-width: 1500px; }
  .events {
    margin-top: 14px; padding: 14px 16px;
    border-top: 1px dashed #263152;
    font-size: 12.5px; color: #b8c5dc; line-height: 1.85;
    background: #0b1424; border-radius: 6px;
    max-height: 420px; overflow-y: auto;
  }
  .events::-webkit-scrollbar { width: 8px; }
  .events::-webkit-scrollbar-track { background: #0b1424; }
  .events::-webkit-scrollbar-thumb { background: #2d3a5f; border-radius: 4px; }
  .events .row { margin-bottom: 3px; }
  .events .row.today {
    background: rgba(251,191,36,0.1);
    border-left: 3px solid #fbbf24;
    padding: 5px 10px; border-radius: 4px; margin-bottom: 6px;
  }
  .events .date { font-weight: 700; color: #e4e7ef; display: inline-block; min-width: 70px; }
  .events .kr { color: #e57373; font-weight: 600; }
  .events .us { color: #7cc88a; font-weight: 600; }
  .events .both { color: #c084fc; font-weight: 600; }
  .events .tag { color: #fbbf24; font-weight: 700; }
  .events .pct { color: #5ba3f5; font-weight: 600; font-variant-numeric: tabular-nums; }
  .legend { display: flex; gap: 16px; font-size: 12px; color: #8ea3c7; margin-top: 6px; justify-content: center; }
  .legend .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>Jin's Portfolio</h1>
    <span class="sub">2026 봄학기 · 3/10 ~ 4/22 · 30개 변동 · 총 90.5%</span>
  </div>

  <div class="tabs">
    <button class="tab active" data-panel="trend">📈 비중 변화</button>
    <button class="tab" data-panel="holdings">📊 종목별 비중</button>
  </div>

  <section class="panel active" id="trend">
    <div class="card">
      <div class="chart-box"><canvas id="trendChart"></canvas></div>
      <div class="legend">
        <span><span class="swatch" style="background:#5ba3f5"></span>총 주식비중</span>
        <span><span class="swatch" style="background:#e57373"></span>🇰🇷 한국 변동</span>
        <span><span class="swatch" style="background:#7cc88a"></span>🇺🇲 미국 변동</span>
        <span><span class="swatch" style="background:#c084fc"></span>🌎 한·미 동시</span>
      </div>
      <div class="events" id="eventList"></div>
    </div>
  </section>

  <section class="panel" id="holdings">
    <div class="card">
      <div class="chart-scroll"><div class="chart-box-wide"><canvas id="holdingsChart"></canvas></div></div>
      <div class="events">
        <div class="row today"><span class="date">4/21 오늘</span> — <span class="tag">🇰🇷 KODEX200 +2, 두산에너빌리티 +1, OCI홀딩스 +1 (총 +4%)</span></div>
        <div class="row"><span class="date">합계</span> — 🇰🇷 <b>51.5%</b> · 🇺🇲 <b>38.0%</b> · <span class="pct">총 89.5%</span></div>
      </div>
    </div>
  </section>
</div>

<script>
Chart.register(ChartDataLabels);

  { date:'3/22', kr:31.0, us:11.0, total:42.0, type:'us',   label:'미국 확장 편출', desc:'테슬라(TSLA) 확장 편출' },
  { date:'3/23', kr:27.0, us:11.0, total:38.0, type:'kr',   label:'한국 4% 축소',   desc:'KODEX200 청산, 삼전·SK·삼기·LS·KB 축소' },
  { date:'3/24', kr:27.0, us:11.0, total:38.0, type:'none', label:'변동없음',       desc:'라이브 · 포지션 유지' },
  { date:'3/25', kr:27.0, us:10.0, total:37.0, type:'us',   label:'미국 편출',      desc:'GOOG 편출 2→0' },
  { date:'3/26', kr:25.0, us:10.0, total:35.0, type:'kr',   label:'한국 편출',      desc:'한화솔루션 편출 2→0' },
  { date:'3/27', kr:19.5, us:10.0, total:29.5, type:'kr',   label:'한국 5.5% 축소', desc:'삼전·삼기·LS·미래에셋 축소' },
  { date:'3/27', kr:19.5, us:9.0,  total:28.5, type:'us',   label:'미국 1% 축소',   desc:'COHR 1/3 정리 (3→2)' },
  { date:'3/29', kr:21.5, us:9.0,  total:30.5, type:'kr',   label:'한국 2% 증액',   desc:'OCI홀딩스 편입 2%' },
  { date:'3/31', kr:21.5, us:5.0,  total:26.5, type:'us',   label:'미국 4% 편출',   desc:'AVGO·COHR 편출' },
  { date:'4/3',  kr:21.5, us:9.0,  total:30.5, type:'us',   label:'미국 4% 편입',   desc:'INTC 편입 이동 2%, LITE 신규 2%' },
  { date:'4/5',  kr:22.5, us:9.0,  total:31.5, type:'kr',   label:'한국 1% 증액',   desc:'OCI홀딩스 2→3' },
  { date:'4/7',  kr:22.5, us:11.0, total:33.5, type:'us',   label:'미국 2% 증액',   desc:'SNDK 2% 신규편입' },
  { date:'4/8',  kr:35.5, us:11.0, total:46.5, type:'kr',   label:'🎉 휴전선언 +13%', desc:'KODEX200 신규, 삼전·삼기·KB +2, 현대건설·SK·미래에셋 +1' },
  { date:'4/9',  kr:35.5, us:19.0, total:54.5, type:'us',   label:'미국 8% 증액',   desc:'CAT·C 신규, INTC·LITE·LRCX·VRT +1' },

  { date:'4/12', kr:36.5, us:26.0, total:62.5, type:'both', label:'한국 1% + 미국 4%', desc:'AVGO 재편입, LRCX·VRT +1, 삼성전기 +1' },
  { date:'4/13', kr:37.5, us:26.0, total:63.5, type:'kr',   label:'한국 1% 증액',   desc:'LS ELECTRIC 2→3' },
  { date:'4/14', kr:41.5, us:30.0, total:71.5, type:'both', label:'한·미 각 4% 증액', desc:'IWM +2, INTC·CAT +1 / KODEX200 +2, SK·미래에셋 +1' },
  { date:'4/15', kr:41.5, us:35.0, total:76.5, type:'us',   label:'미국 5% 증액',   desc:'CITY 2→4, GOOG 신규 2, AVGO +1' },
  { date:'4/15', kr:41.5, us:35.0, total:76.5, type:'kr',   label:'한국 2% 교체',   desc:'한화 편출(확장), 삼성전기·OCI +1' },
  { date:'4/16', kr:45.5, us:35.0, total:80.5, type:'kr',   label:'한국 4% 증액',   desc:'두산·현대차 +1, KODEX200 +2' },
  { date:'4/17', kr:45.5, us:36.0, total:81.5, type:'us',   label:'미국 1% 증액',   desc:'INTC 4→5' },
  { date:'4/19', kr:45.5, us:39.0, total:84.5, type:'us',   label:'미국 3% 증액',   desc:'AVGO +1, IWM +2, FDX 확장 재편입' },
  { date:'4/19', kr:46.5, us:39.0, total:85.5, type:'kr',   label:'한국 1% 증액',   desc:'LS ELECTRIC 3→4' },
  { date:'4/21', kr:50.5, us:39.0, total:89.5, type:'kr',   label:'봄학기 라이브',    desc:'KODEX200 +2, 두산 +1, OCI +1' },
  { date:'4/22', kr:51.5, us:39.0, total:90.5, type:'kr',   label:'한국 1% 증액 (오늘)', desc:'LS ELECTRIC 4→5' }
];

// ─── 추세 차트 (3선: 총합 · 🇰🇷 · 🇺🇲) ─────────────────────
const ptColors = events.map(e => e.type==='kr'?'#e57373': e.type==='us'?'#7cc88a': e.type==='none'?'#6b7280': '#c084fc');
const trendCtx = document.getElementById('trendChart').getContext('2d');
new Chart(trendCtx, {
  type: 'line',
  data: {
    labels: events.map((e,i)=>e.date),
    datasets: [
      {
        label: '총 주식비중',
        data: events.map(e=>e.total),
        borderColor: '#5ba3f5',
        backgroundColor: 'rgba(91,163,245,0.10)',
        borderWidth: 2.8, pointRadius: 5, pointHoverRadius: 7,
        pointBackgroundColor: ptColors,
        pointBorderColor: '#0f1a2e', pointBorderWidth: 2,
        fill: true, tension: 0.25, order: 3,
        datalabels: {
          color: '#5ba3f5', font: { size: 10, weight: '700' },
          align: 'top', offset: 8,
          formatter: (v)=>v.toFixed(1)+'%'
        }
      },
      {
        label: '🇰🇷 한국',
        data: events.map(e=>e.kr),
        borderColor: '#e57373',
        backgroundColor: 'rgba(229,115,115,0.0)',
        borderWidth: 2, pointRadius: 3, pointHoverRadius: 6,
        pointBackgroundColor: '#e57373',
        pointBorderColor: '#0f1a2e', pointBorderWidth: 1.5,
        borderDash: [], tension: 0.25, order: 1,
        datalabels: { display: false }
      },
      {
        label: '🇺🇲 미국',
        data: events.map(e=>e.us),
        borderColor: '#7cc88a',
        backgroundColor: 'rgba(124,200,138,0.0)',
        borderWidth: 2, pointRadius: 3, pointHoverRadius: 6,
        pointBackgroundColor: '#7cc88a',
        pointBorderColor: '#0f1a2e', pointBorderWidth: 1.5,
        borderDash: [], tension: 0.25, order: 2,
        datalabels: { display: false }
      }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        display: true, position: 'top', align: 'end',
        labels: {
          color: '#e4e7ef', font: { size: 12, weight: '600' },
          padding: 14, boxWidth: 18, boxHeight: 3, usePointStyle: false
        }
      },
      tooltip: {
        backgroundColor: '#0b1424', titleColor: '#fbbf24',
        bodyColor: '#e4e7ef', borderColor: '#2d3a5f', borderWidth: 1,
        padding: 12, cornerRadius: 6,
        callbacks: {
          title: (items) => events[items[0].dataIndex].date + ' · ' + events[items[0].dataIndex].label,
          label: (item) => {
            const e = events[item.dataIndex];
            if (item.datasetIndex === 0) return '총 ' + e.total.toFixed(1) + '%  (🇰🇷 ' + e.kr.toFixed(1) + ' + 🇺🇲 ' + e.us.toFixed(1) + ')';
            if (item.datasetIndex === 1) return '🇰🇷 한국: ' + e.kr.toFixed(1) + '%';
            return '🇺🇲 미국: ' + e.us.toFixed(1) + '%';
          },
          afterBody: (items) => events[items[0].dataIndex].desc
        }
      }
    },
    scales: {
      x: { ticks: { color: '#8ea3c7', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
      y: {
        min: 0, max: 100,
        ticks: { color: '#8ea3c7', callback: (v)=>v+'%' },
        grid: { color: 'rgba(255,255,255,0.06)' }
      }
    }
  }
});

// ─── 이벤트 리스트 ──────────────────────────────────────
const evWrap = document.getElementById('eventList');
[...events].reverse().forEach((e,i) => {
  const cls = i===0 ? 'row today' : 'row';
  const typeSpan = e.type==='kr' ? '<span class="kr">🇰🇷</span>'
                  : e.type==='us' ? '<span class="us">🇺🇲</span>'
                  : e.type==='none' ? '<span style="color:#6b7280">⏸</span>'
                  : '<span class="both">🌎</span>';
  const labelHtml = i===0 ? '<span class="tag">'+e.label+'</span>' : e.label;
  evWrap.innerHTML += '<div class="'+cls+'"><span class="date">'+e.date+'</span> '+typeSpan+' '+labelHtml+' · <span style="color:#8ea3c7">'+e.desc+'</span> · <span class="pct">'+e.total.toFixed(1)+'%</span></div>';
});

// ─── 보유 종목 (현재 기준) ─────────────────────────────
const holdings = [
  { name:'KODEX 200',          market:'KR', total:10,  today:0 },
  { name:'삼성전기',             market:'KR', total:6,   today:0 },
  { name:'OCI홀딩스',            market:'KR', total:5,   today:0 },
  { name:'SK하이닉스',           market:'KR', total:4.5, today:0 },
  { name:'삼성전자',             market:'KR', total:4,   today:0 },
  { name:'KB금융',               market:'KR', total:4,   today:0 },
  { name:'두산에너빌리티',        market:'KR', total:4,   today:0 },
  { name:'미래에셋증권',          market:'KR', total:4,   today:0 },
  { name:'LS ELECTRIC',          market:'KR', total:5,   today:1 },
  { name:'현대건설',             market:'KR', total:3,   today:0 },
  { name:'현대차',               market:'KR', total:3,   today:0 },
  { name:'iShares Russell 2000 (IWM)', market:'US', total:6, today:0 },
  { name:'Intel (INTC)',         market:'US', total:5,  today:0 },
  { name:'Broadcom (AVGO)',      market:'US', total:4,  today:0 },
  { name:'Lam Research (LRCX)',  market:'US', total:4,  today:0 },
  { name:'Vertiv (VRT)',         market:'US', total:4,  today:0 },
  { name:'Citigroup (C)',        market:'US', total:4,  today:0 },
  { name:'SanDisk (SNDK)',       market:'US', total:3,  today:0 },
  { name:'Caterpillar (CAT)',    market:'US', total:3,  today:0 },
  { name:'Lumentum (LITE)',      market:'US', total:3,  today:0 },
  { name:'Alphabet (GOOGL)',     market:'US', total:2,  today:0 }
];

const dividerIdx = holdings.findIndex(h => h.market === 'US') - 0.5;

const dividerPlugin = {
  id: 'divider',
  afterDatasetsDraw(chart) {
    const {ctx, chartArea:{top, bottom}, scales:{x}} = chart;
    const xPos = x.getPixelForValue(dividerIdx);
    ctx.save();
    ctx.strokeStyle = '#2d3a5f';
    ctx.lineWidth = 1;
    ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(xPos, top); ctx.lineTo(xPos, bottom); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#e57373'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('🇰🇷 KR 51.5%', (x.getPixelForValue(0)+xPos)/2, top+18);
    ctx.fillStyle = '#7cc88a';
    ctx.fillText('🇺🇲 US 38.0%', (xPos+x.getPixelForValue(holdings.length-1))/2, top+18);
    ctx.restore();
  }
};

const hCtx = document.getElementById('holdingsChart').getContext('2d');
new Chart(hCtx, {
  type: 'bar',
  data: {
    labels: holdings.map(h=>h.name),
    datasets: [
      {
        label: '기존 비중',
        data: holdings.map(h=> h.total - h.today),
        backgroundColor: holdings.map(h=> h.market==='KR' ? '#e57373' : '#7cc88a'),
        stack: 's1', borderRadius: {topLeft:0,topRight:0,bottomLeft:4,bottomRight:4}
      },
      {
        label: '오늘 증가',
        data: holdings.map(h=>h.today),
        backgroundColor: '#fbbf24',
        stack: 's1', borde
