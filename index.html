<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jin's Portfolio</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR','Malgun Gothic',sans-serif;
    background: #0b1220; color: #e4e7ef; padding: 16px; min-height: 100vh;
  }
  .wrap { max-width: 1400px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 700; color: #fbbf24; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #8ea3c7; margin-bottom: 18px; }
  .card {
    background: #111a2d; border: 1px solid #1e2a44; border-radius: 14px;
    padding: 18px 20px 20px; margin-bottom: 18px;
  }
  .card-title { font-size: 15px; font-weight: 700; color: #e4e7ef; margin-bottom: 14px; }
  .chart-box { position: relative; height: 420px; }
  .chart-box-wide { position: relative; height: 460px; min-width: 1400px; }
  .chart-scroll { width: 100%; overflow-x: auto; }
  .legend {
    display: flex; gap: 18px; justify-content: flex-end;
    font-size: 12px; color: #b8c5dc; margin-top: 10px; flex-wrap: wrap;
  }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 50%; }
  .err { background: #3b1d24; color: #ff9b9b; padding: 14px; border-radius: 8px; font-size: 13px; margin: 12px 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Jin's Portfolio</h1>
  <div class="sub" id="sub">2026 봄학기 · 3/10 ~ 4/22 · 30개 변동 · 총 90.5%</div>

  <div class="card">
    <div class="card-title">📊 종목별 비중 · 한국 51.5% / 미국 39.0%</div>
    <div class="chart-scroll"><div class="chart-box-wide"><canvas id="holdingsChart"></canvas></div></div>
  </div>

  <div class="card">
    <div class="card-title">📈 비중 변화 추세 (3/10 ~ 4/22)</div>
    <div class="chart-box"><canvas id="trendChart"></canvas></div>
    <div class="legend">
      <span><span class="swatch" style="background:#5ba3f5"></span>총 주식비중</span>
      <span><span class="swatch" style="background:#e57373"></span>🇰🇷 한국</span>
      <span><span class="swatch" style="background:#7cc88a"></span>🇺🇲 미국</span>
    </div>
  </div>

  <div id="err"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  try {
    if (typeof Chart === 'undefined') {
      throw new Error('Chart.js failed to load');
    }
    if (typeof ChartDataLabels !== 'undefined') {
      Chart.register(ChartDataLabels);
    }

    // 종목별 보유 (오늘 기준)
    const holdings = [
      { name:'KODEX 200', market:'kr', pct:10.0 },
      { name:'삼성전자', market:'kr', pct:6.0 },
      { name:'LS ELECTRIC', market:'kr', pct:5.0 },
      { name:'삼성전기', market:'kr', pct:5.0 },
      { name:'SK하이닉스', market:'kr', pct:4.0 },
      { name:'KB금융', market:'kr', pct:4.0 },
      { name:'두산에너빌리티', market:'kr', pct:4.0 },
      { name:'OCI홀딩스', market:'kr', pct:4.0 },
      { name:'미래에셋증권', market:'kr', pct:3.0 },
      { name:'현대차', market:'kr', pct:3.0 },
      { name:'현대건설', market:'kr', pct:2.5 },
      { name:'한화솔루션', market:'kr', pct:1.0 },
      { name:'AVGO', market:'us', pct:5.0 },
      { name:'INTC', market:'us', pct:5.0 },
      { name:'IWM', market:'us', pct:4.0 },
      { name:'CITY', market:'us', pct:4.0 },
      { name:'LRCX', market:'us', pct:3.0 },
      { name:'VRT', market:'us', pct:3.0 },
      { name:'LITE', market:'us', pct:3.0 },
      { name:'CAT', market:'us', pct:3.0 },
      { name:'SNDK', market:'us', pct:3.0 },
      { name:'C', market:'us', pct:2.0 },
      { name:'GOOG', market:'us', pct:2.0 },
      { name:'FDX', market:'us', pct:2.0 }
    ];

    // 비중 변화 이력
    const events = [
      { date:'3/10', kr:20.0, us:10.0, total:30.0 },
      { date:'3/17', kr:30.0, us:10.0, total:40.0 },
      { date:'3/19', kr:31.0, us:10.0, total:41.0 },
      { date:'3/20', kr:31.0, us:11.0, total:42.0 },
      { date:'3/22', kr:31.0, us:11.0, total:42.0 },
      { date:'3/23', kr:27.0, us:11.0, total:38.0 },
      { date:'3/25', kr:27.0, us:10.0, total:37.0 },
      { date:'3/26', kr:25.0, us:10.0, total:35.0 },
      { date:'3/27', kr:19.5, us:9.0,  total:28.5 },
      { date:'3/29', kr:21.5, us:9.0,  total:30.5 },
      { date:'3/31', kr:21.5, us:5.0,  total:26.5 },
      { date:'4/3',  kr:21.5, us:9.0,  total:30.5 },
      { date:'4/5',  kr:22.5, us:9.0,  total:31.5 },
      { date:'4/7',  kr:22.5, us:11.0, total:33.5 },
      { date:'4/8',  kr:35.5, us:11.0, total:46.5 },
      { date:'4/9',  kr:35.5, us:19.0, total:54.5 },
      { date:'4/10', kr:35.5, us:22.0, total:57.5 },
      { date:'4/12', kr:36.5, us:26.0, total:62.5 },
      { date:'4/13', kr:37.5, us:26.0, total:63.5 },
      { date:'4/14', kr:41.5, us:30.0, total:71.5 },
      { date:'4/15', kr:41.5, us:35.0, total:76.5 },
      { date:'4/16', kr:45.5, us:35.0, total:80.5 },
      { date:'4/17', kr:45.5, us:36.0, total:81.5 },
      { date:'4/19', kr:46.5, us:39.0, total:85.5 },
      { date:'4/21', kr:50.5, us:39.0, total:89.5 },
      { date:'4/22', kr:51.5, us:39.0, total:90.5 }
    ];

    // 종목별 비중 바 차트
    const hCtx = document.getElementById('holdingsChart').getContext('2d');
    new Chart(hCtx, {
      type: 'bar',
      data: {
        labels: holdings.map(h => h.name),
        datasets: [{
          data: holdings.map(h => h.pct),
          backgroundColor: holdings.map(h => h.market === 'kr' ? '#e57373' : '#7cc88a'),
          borderRadius: 4, maxBarThickness: 46
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          datalabels: {
            color: '#fff', anchor: 'end', align: 'top', offset: 4,
            font: { size: 11, weight: '700' },
            formatter: v => v + '%'
          },
          tooltip: {
            backgroundColor: '#0b1424', titleColor: '#fbbf24', bodyColor: '#e4e7ef',
            callbacks: { label: ctx => ctx.raw + '%' }
          }
        },
        scales: {
          x: {
            ticks: { color: '#b8c5dc', font: { size: 11 }, maxRotation: 45, minRotation: 45 },
            grid: { display: false }
          },
          y: {
            ticks: { color: '#6b7280', callback: v => v + '%' },
            grid: { color: '#1e2a44' },
            beginAtZero: true, suggestedMax: 12
          }
        }
      }
    });

    // 비중 변화 추세 (3선)
    const tCtx = document.getElementById('trendChart').getContext('2d');
    new Chart(tCtx, {
      type: 'line',
      data: {
        labels: events.map(e => e.date),
        datasets: [
          {
            label: 'Total', data: events.map(e => e.total),
            borderColor: '#5ba3f5', backgroundColor: 'rgba(91,163,245,0.12)',
            borderWidth: 2.5, pointRadius: 4, pointHoverRadius: 7,
            pointBackgroundColor: '#5ba3f5', fill: true, tension: 0.3,
            datalabels: {
              color: '#5ba3f5', font: { size: 10, weight: '700' },
              align: 'top', offset: 8,
              formatter: (v, ctx) => (ctx.dataIndex % 3 === 0 || ctx.dataIndex === events.length - 1) ? v.toFixed(1) + '%' : ''
            }
          },
          {
            label: 'KR', data: events.map(e => e.kr),
            borderColor: '#e57373', backgroundColor: 'rgba(229,115,115,0)',
            borderWidth: 2, pointRadius: 3, pointHoverRadius: 6,
            pointBackgroundColor: '#e57373', tension: 0.3,
            datalabels: { display: false }
          },
          {
            label: 'US', data: events.map(e => e.us),
            borderColor: '#7cc88a', backgroundColor: 'rgba(124,200,138,0)',
            borderWidth: 2, pointRadius: 3, pointHoverRadius: 6,
            pointBackgroundColor: '#7cc88a', tension: 0.3,
            datalabels: { display: false }
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0b1424', titleColor: '#fbbf24', bodyColor: '#e4e7ef',
            callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(1) + '%' }
          }
        },
        scales: {
          x: {
            ticks: { color: '#b8c5dc', font: { size: 10.5 }, maxRotation: 45, minRotation: 45, autoSkip: false },
            grid: { color: '#1a253f' }
          },
          y: {
            ticks: { color: '#6b7280', callback: v => v + '%' },
            grid: { color: '#1e2a44' },
            beginAtZero: true, suggestedMax: 100
          }
        }
      }
    });
  } catch (e) {
    document.getElementById('err').innerHTML = '<div class="err">차트 로딩 실패: ' + e.message + '<br>브라우저 개발자도구(F12) Console 탭을 확인하세요.</div>';
    console.error(e);
  }
});
</script>
</body>
</html>
