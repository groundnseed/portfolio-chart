<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jin's Portfolio</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans KR','Malgun Gothic',sans-serif; background:#0b1220; color:#e4e7ef; padding:16px; }
  .wrap { max-width:1700px; margin:0 auto; }
  h1 { font-size:22px; font-weight:700; color:#fbbf24; margin-bottom:4px; }
  .sub { font-size:13px; color:#8ea3c7; margin-bottom:18px; }
  .section { margin-bottom:18px; }
  .section-label { font-size:11px; color:#4b5563; margin-bottom:4px; padding-left:4px; }
  iframe { width:100%; border:none; border-radius:14px; display:block; overflow:hidden; min-height:200px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Jin's Portfolio</h1>
  <div class="sub">2026 봄~여름 · 3/10 ~ 7/8 · 총 43.5% (🇰🇷 14.5% + 🇺🇸 29.0%)</div>

  <div class="section">
    <div class="section-label">찐샘 포트폴리오 보유종목</div>
    <iframe src="holdings.html" id="f0" scrolling="no" onload="autoH(this)"></iframe>
  </div>

  <div class="section">
    <div class="section-label">Jin's Portfolio 비중 변화</div>
    <iframe src="trend.html" id="f1" scrolling="no" onload="autoH(this)"></iframe>
  </div>

  <div class="section">
    <div class="section-label">Jin's Portfolio 누적 수익금</div>
    <iframe src="return.html" id="f2" scrolling="no" onload="autoH(this)"></iframe>
  </div>

  <div class="section">
    <div class="section-label">종목별 현재 수익률</div>
    <iframe src="stock-return.html" id="f3" scrolling="no" onload="autoH(this)"></iframe>
  </div>

  <div class="section">
    <div class="section-label">비중 vs 수익률 (사분면)</div>
    <iframe src="quadrant.html" id="f4" scrolling="no" onload="autoH(this)"></iframe>
  </div>

  <div class="section">
    <div class="section-label">종목별 개별 차트</div>
    <iframe src="stock-chart.html" id="f5" scrolling="no" onload="autoH(this)"></iframe>
  </div>
</div>
<script>
function autoH(fr) {
  try {
    var h = fr.contentDocument.documentElement.scrollHeight
           || fr.contentDocument.body.scrollHeight;
    fr.style.height = (h + 8) + 'px';
  } catch(e) {}
}
</script>
</body>
</html>
