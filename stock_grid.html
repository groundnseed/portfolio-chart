<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찐샘 포트폴리오 — 종목별 차트</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #0b1220; color: #e4e7ef; padding: 16px; }
.hdr { text-align: center; margin-bottom: 20px; }
.hdr h1 { font-size: 18px; font-weight: 700; color: #e2e8f0; }
.hdr .sub { font-size: 11px; color: #4b5563; margin-top: 4px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
@media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
.card {
  background: #111a2d; border: 1px solid #1e2a44; border-radius: 12px;
  padding: 12px 14px 14px; position: relative;
}
.card-hdr {
  display: flex; align-items: baseline; gap: 6px;
  margin-bottom: 4px;
}
.card-name { font-size: 14px; font-weight: 700; color: #e2e8f0; }
.card-flag { font-size: 14px; }
.card-meta { font-size: 11px; color: #6b7280; }
.card-pnl { font-size: 13px; font-weight: 700; color: #34d399; margin-left: auto; }
.card-pnl.neg { color: #f87171; }
.chart-wrap { position: relative; height: 160px; margin-top: 6px; }
.loading { color: #4b5563; font-size: 11px; text-align: center; padding: 60px 0; }
#buildInfo { text-align: center; font-size: 10px; color: #374151; margin-top: 16px; }
</style>
</head>
<body>
<div class="hdr">
  <h1>찐샘의 포트폴리오</h1>
  <div class="sub" id="buildSub">데이터 로딩 중...</div>
</div>
<div class="grid" id="grid"></div>
<div id="buildInfo"></div>

<script>
const STOCKS = {"삼성전기": {"ticker": "009150.KS", "market": "kr", "flag": "🇰🇷", "basis": 518233, "currentPct": 12.0, "returnPct": 248.3, "profit": 1725, "weights": [["3/10", 2], ["3/17", 4], ["3/27", 6], ["4/14", 6], ["4/27", 6], ["6/16", 6], ["6/19", 12]]}, "SK하이닉스": {"ticker": "000660.KS", "market": "kr", "flag": "🇰🇷", "basis": 180000, "currentPct": 9.0, "returnPct": 99.4, "profit": 707, "weights": [["3/10", 2], ["3/17", 4], ["4/14", 4], ["4/27", 4], ["6/16", 5.5], ["6/17", 6.5], ["6/19", 9]]}, "삼성전자": {"ticker": "005930.KS", "market": "kr", "flag": "🇰🇷", "basis": 52000, "currentPct": 8.0, "returnPct": 47.3, "profit": 394, "weights": [["3/10", 2], ["3/24", 4], ["4/27", 6], ["6/16", 6], ["6/19", 8]]}, "LRCX": {"ticker": "LRCX", "market": "us", "flag": "🇺🇸", "basis": 650, "currentPct": 6.0, "returnPct": 53.5, "profit": 369, "weights": [["3/10", 2], ["3/17", 4], ["4/8", 6], ["4/27", 6], ["6/16", 6]]}, "SNDK": {"ticker": "SNDK", "market": "us", "flag": "🇺🇸", "basis": 22, "currentPct": 3.0, "returnPct": 146.6, "profit": 490, "weights": [["3/10", 1], ["3/17", 2], ["3/27", 3], ["4/27", 3], ["6/16", 3]]}, "INTC": {"ticker": "INTC", "market": "us", "flag": "🇺🇸", "basis": 18, "currentPct": 5.0, "returnPct": 111.5, "profit": 594, "weights": [["3/10", 1], ["3/17", 2], ["4/14", 4], ["4/27", 5], ["6/16", 5]]}, "ARM": {"ticker": "ARM", "market": "us", "flag": "🇺🇸", "basis": 90, "currentPct": 3.0, "returnPct": 32.1, "profit": 108, "weights": [["3/17", 2], ["4/27", 3], ["6/16", 3]]}, "AMAT": {"ticker": "AMAT", "market": "us", "flag": "🇺🇸", "basis": 140, "currentPct": 3.0, "returnPct": 22.5, "profit": 75, "weights": [["4/14", 2], ["4/27", 2], ["6/16", 2], ["6/19", 3]]}, "IWM": {"ticker": "IWM", "market": "us", "flag": "🇺🇸", "basis": 195, "currentPct": 6.0, "returnPct": 18.4, "profit": 102, "weights": [["4/8", 5], ["4/27", 5], ["6/16", 5], ["6/19", 6]]}, "KB금융": {"ticker": "105560.KS", "market": "kr", "flag": "🇰🇷", "basis": 68000, "currentPct": 4.0, "returnPct": 38.2, "profit": 182, "weights": [["3/10", 2], ["4/14", 4], ["6/16", 4]]}, "현대차": {"ticker": "005380.KS", "market": "kr", "flag": "🇰🇷", "basis": 220000, "currentPct": 3.0, "returnPct": 12.1, "profit": 41, "weights": [["3/17", 2], ["4/27", 3], ["6/16", 3]]}, "CAT": {"ticker": "CAT", "market": "us", "flag": "🇺🇸", "basis": 320, "currentPct": 3.0, "returnPct": 8.3, "profit": 28, "weights": [["6/17", 2], ["6/19", 3]]}};

const PROXY = 'https://corsproxy.io/?';
const YF_BASE = 'https://query1.finance.yahoo.com/v8/finance/chart/';

// Parse date string "M/D" relative to 2026
function parseDate(s) {
  const [m, d] = s.split('/').map(Number);
  return new Date(2026, m-1, d);
}

// Build grid cards first (loading state)
function buildGrid() {
  const grid = document.getElementById('grid');
  Object.entries(STOCKS).forEach(([name, s]) => {
    const pnlSign = s.returnPct >= 0 ? '+' : '';
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + name;
    card.innerHTML = `
      <div class="card-hdr">
        <span class="card-flag">${s.flag}</span>
        <span class="card-name">${name}</span>
        <span class="card-meta">${s.currentPct}% / ${pnlSign}${s.returnPct}%</span>
        <span class="card-pnl ${s.returnPct < 0 ? 'neg' : ''}">
          ${s.profit >= 0 ? '+' : ''}${s.profit.toLocaleString()}만
        </span>
      </div>
      <div class="chart-wrap">
        <div class="loading" id="load-${name}">주가 불러오는 중...</div>
        <canvas id="chart-${name}" style="display:none"></canvas>
      </div>`;
    grid.appendChild(card);
  });
}

// Fetch price data for one ticker
async function fetchPrices(ticker) {
  const now = Math.floor(Date.now() / 1000);
  const start = Math.floor(new Date('2026-03-01').getTime() / 1000);
  const url = `${YF_BASE}${ticker}?interval=1d&period1=${start}&period2=${now}`;
  try {
    const res = await fetch(PROXY + encodeURIComponent(url));
    const data = await res.json();
    const result = data.chart?.result?.[0];
    if (!result) return null;
    const timestamps = result.timestamp;
    const closes = result.indicators.quote[0].close;
    const prices = {};
    timestamps.forEach((ts, i) => {
      if (closes[i] == null) return;
      const d = new Date(ts * 1000);
      const key = `${d.getMonth()+1}/${d.getDate()}`;
      prices[key] = closes[i];
    });
    return prices;
  } catch(e) {
    return null;
  }
}

// Compute weight at a given date from weight history
function weightAt(weights, targetDate) {
  let w = 0;
  for (const [ds, pct] of weights) {
    if (parseDate(ds) <= targetDate) w = pct;
    else break;
  }
  return w;
}

// Render one stock chart
function renderChart(name, stock, priceMap) {
  const loader = document.getElementById('load-' + name);
  const canvas = document.getElementById('chart-' + name);

  if (!priceMap || Object.keys(priceMap).length === 0) {
    loader.textContent = '데이터 없음';
    return;
  }

  loader.style.display = 'none';
  canvas.style.display = 'block';

  // Build date-sorted arrays
  const entries = Object.entries(priceMap).sort((a, b) => {
    const [am, ad] = a[0].split('/').map(Number);
    const [bm, bd] = b[0].split('/').map(Number);
    return (am * 100 + ad) - (bm * 100 + bd);
  });

  const labels = entries.map(e => e[0]);
  const prices = entries.map(e => e[1]);
  const basisPrice = prices[0] || stock.basis;

  // Compute weight for each date
  const weights = entries.map(([ds]) => {
    const d = parseDate(ds);
    return weightAt(stock.weights, d);
  });

  // Cumulative return at each date (based on price)
  const returns = prices.map(p => ((p - basisPrice) / basisPrice * 100));

  // Trade event dots: dates where weight changed
  const tradeDates = new Set(stock.weights.map(w => w[0]));
  const pointRadii = labels.map(l => tradeDates.has(l) ? 5 : 0);
  const pointBgs  = labels.map(l => tradeDates.has(l) ? '#ef4444' : 'transparent');

  const ctx = canvas.getContext('2d');
  new Chart(ctx, {
    data: {
      labels,
      datasets: [
        {
          type: 'line', label: '주가', data: prices, yAxisID: 'yPrice',
          borderColor: '#ec4899', borderWidth: 1.5, pointRadius: 0,
          tension: 0.2, fill: false
        },
        {
          type: 'line', label: '비중%', data: weights, yAxisID: 'yPct',
          borderColor: '#5b8dee', borderWidth: 2, pointRadius: pointRadii,
          pointBackgroundColor: pointBgs, pointBorderColor: pointBgs,
          stepped: 'before', fill: false
        },
        {
          type: 'line', label: '수익률%', data: returns, yAxisID: 'yRet',
          borderColor: '#34d399', borderWidth: 1.5, pointRadius: 0,
          tension: 0.2, fill: false
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: false }, tooltip: {
        mode: 'index', intersect: false,
        backgroundColor: '#0b1424', titleColor: '#fbbf24', bodyColor: '#e4e7ef',
        callbacks: {
          label: ctx => {
            if (ctx.dataset.label === '주가') return `주가 ${ctx.raw?.toLocaleString()}`;
            if (ctx.dataset.label === '비중%') return `비중 ${ctx.raw}%`;
            if (ctx.dataset.label === '수익률%') return `수익 ${ctx.raw >= 0 ? '+' : ''}${ctx.raw?.toFixed(1)}%`;
          }
        }
      }},
      scales: {
        x: {
          ticks: { color: '#4b5563', font: { size: 9 }, maxTicksLimit: 6, maxRotation: 0 },
          grid: { display: false }
        },
        yPrice: {
          position: 'left', display: true,
          ticks: { color: '#6b7280', font: { size: 9 }, maxTicksLimit: 5,
            callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v.toFixed(0) },
          grid: { color: '#1a2340' }
        },
        yPct: {
          position: 'right', display: true,
          ticks: { color: '#5b8dee', font: { size: 9 }, maxTicksLimit: 5,
            callback: v => v + '%' },
          grid: { display: false }
        },
        yRet: {
          position: 'right', display: false,
          ticks: { color: '#34d399', font: { size: 9 },
            callback: v => (v >= 0 ? '+' : '') + v.toFixed(0) + '%' },
          grid: { display: false }
        }
      }
    }
  });
}

async function main() {
  buildGrid();
  const now = new Date();
  const buildStr = `데이터: 3/9~${now.getMonth()+1}/${now.getDate()} daily · 빌드: ${now.toLocaleString('ko-KR', {timeZone:'Asia/Seoul'})} KST`;
  document.getElementById('buildSub').textContent = buildStr;
  document.getElementById('buildInfo').textContent = buildStr;

  // Fetch all stocks in parallel (limit 3 at a time)
  const entries = Object.entries(STOCKS);
  for (let i = 0; i < entries.length; i += 3) {
    const batch = entries.slice(i, i+3);
    await Promise.all(batch.map(async ([name, stock]) => {
      const prices = await fetchPrices(stock.ticker);
      renderChart(name, stock, prices);
    }));
  }
}

main();
</script>
</body>
</html>
