<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans KR','Malgun Gothic',sans-serif; background:#0b1220; color:#e4e7ef; padding:14px; }
  .card { background:#111a2d; border:1px solid #1e2a44; border-radius:14px; padding:16px 18px 20px; }
  .err { background:#3b1d24; color:#ff9b9b; padding:12px; border-radius:8px; font-size:13px; margin-top:8px; }
</style>
</head>
<body>
<div class="card">
  <div style="font-size:14px;font-weight:700;color:#b8c5dc;margin-bottom:10px;text-align:center;">
    Jin&#39;s Portfolio 누적 수익금
    <span style="color:#6b7280;font-size:11px;font-weight:400;">(원금 1,000만원 기준)</span>
  </div>
  <div style="position:relative;height:480px;"><canvas id="returnChart"></canvas></div>
  <div style="text-align:center;font-size:11px;margin-top:8px;" id="returnNote"></div>
</div>
<div id="err"></div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  try {
    if (typeof Chart === 'undefined') throw new Error('Chart.js 로드 실패');
    if (typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);

    // 노션 "💰 1억 투자 수익금 추이" DB에서 가져온 실제 데이터
    // 1억 기준 → 1천만원 기준으로 /10 환산
    const SCALE = 0.1;
    const raw = [
      { date:'3/10', total:-557, kr:-407, us:-149, note:'봄학기 첫 편입 (총 30%)' },
      { date:'3/13', total:-563, kr:-401, us:-162, note:'' },
      { date:'3/17', total:-392, kr:-288, us:-104, note:'' },
      { date:'3/19', total:-185, kr:-158, us:-27,  note:'' },
      { date:'3/24', total:-397, kr:-345, us:-51,  note:'' },
      { date:'3/26', total:-496, kr:-353, us:-143, note:'' },
      { date:'3/27', total:-501, kr:-362, us:-139, note:'금리 급등 + AI H/W 충격 → 트리밍' },
      { date:'4/2',  total:-527, kr:-492, us:-35,  note:'' },
      { date:'4/3',  total:-377, kr:-377, us:0,    note:'' },
      { date:'4/6',  total:-387, kr:-349, us:-39,  note:'' },
      { date:'4/8',  total:-51,  kr:-116, us:65,   note:'🎉 휴전선언, 한국 13% 증액' },
      { date:'4/9',  total:-62,  kr:-173, us:112,  note:'' },
      { date:'4/14', total:142,  kr:-17,  us:158,  note:'LIVE 6 대쪽증액' },
      { date:'4/15', total:239,  kr:105,  us:134,  note:'' },
      { date:'4/16', total:433,  kr:265,  us:169,  note:'' },
      { date:'4/17', total:433,  kr:246,  us:187,  note:'' },
      { date:'4/21', total:557,  kr:408,  us:149,  note:'미세조정 시작 (85% 도달)' },
      { date:'4/28', total:881,  kr:677,  us:204,  note:'' },
      { date:'5/1',  total:364,  kr:0,    us:364,  note:'' },
      { date:'5/15', total:1817, kr:1288, us:529,  note:'' },
      { date:'5/19', total:1606, kr:1104, us:502,  note:'' },
      { date:'5/29', total:3258, kr:2591, us:667,  note:'' },
      { date:'6/1',  total:3379, kr:2684, us:696,  note:'최고점' },
      { date:'6/3',  total:806,  kr:0,    us:806,  note:'' },
      { date:'6/4',  total:3099, kr:2319, us:780,  note:'' },
      { date:'6/9',  total:2851, kr:2181, us:670,  note:'' },
      { date:'6/11', total:2744, kr:1903, us:841,  note:'BE 편출' },
    ];

    const events = raw.map(d => ({
      date: d.date,
      total: Math.round(d.total * SCALE * 10) / 10,
      kr:    Math.round(d.kr    * SCALE * 10) / 10,
      us:    Math.round(d.us    * SCALE * 10) / 10,
      note:  d.note
    }));

    const last = events[events.length - 1];
    const peak = events.reduce((m, e) => e.total > m.total ? e : m, events[0]);

    // callout 표시용 플러그인
    const notePlugin = {
      id: 'notePlugin',
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        const meta = chart.getDatasetMeta(0);
        if (!meta?.data?.length) return;
        events.forEach((e, i) => {
          if (!e.note) return;
          const p = meta.data[i];
          if (!p) return;
          const lines = e.note.split(' ');
          ctx.save();
          ctx.beginPath();
          ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
          ctx.fillStyle = '#fbbf24'; ctx.fill();
          ctx.strokeStyle = '#0b1424'; ctx.lineWidth = 1.5; ctx.stroke();
          const bx = p.x, by = p.y - 48;
          ctx.font = 'bold 9.5px system-ui'; ctx.textAlign = 'center';
          lines.forEach((line, j) => {
            const y = by + j * 12;
            ctx.strokeStyle = 'rgba(11,20,36,0.9)'; ctx.lineWidth = 3;
            ctx.strokeText(line, bx, y);
            ctx.fillStyle = j === 0 ? '#fbbf24' : '#e4e7ef';
            ctx.fillText(line, bx, y);
          });
          ctx.restore();
        });
      }
    };

    new Chart(document.getElementById('returnChart').getContext('2d'), {
      type: 'line',
      data: {
        labels: events.map(e => e.date),
        datasets: [
          {
            label: '총 수익금',
            data: events.map(e => e.total),
            borderColor: '#fbbf24', backgroundColor: 'rgba(251,191,36,0.12)',
            borderWidth: 3, pointRadius: 4, pointHoverRadius: 7,
            pointBackgroundColor: '#fbbf24', pointBorderColor: '#0f1a2e', pointBorderWidth: 2,
            fill: true, tension: 0.3, order: 3
          },
          {
            label: '🇰🇷 한국',
            data: events.map(e => e.kr),
            borderColor: '#e57373', backgroundColor: 'transparent',
            borderWidth: 2, pointRadius: 2.5, pointHoverRadius: 5,
            tension: 0.3, order: 2
          },
          {
            label: '🇺🇲 미국',
            data: events.map(e => e.us),
            borderColor: '#7cc88a', backgroundColor: 'transparent',
            borderWidth: 2, pointRadius: 2.5, pointHoverRadius: 5,
            tension: 0.3, order: 1
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 60, right: 20, left: 6, bottom: 6 } },
        plugins: {
          legend: {
            display: true, position: 'bottom',
            labels: { color: '#b8c5dc', font: { size: 11 }, boxWidth: 14, boxHeight: 8 }
          },
          datalabels: {
            display: ctx => ctx.datasetIndex === 0 && ctx.dataIndex === ctx.dataset.data.length - 1,
            color: '#fbbf24', anchor: 'end', align: 'top', offset: 6,
            font: { size: 13, weight: '700' },
            formatter: v => (v >= 0 ? '+' : '') + v.toFixed(0) + '만'
          },
          tooltip: {
            backgroundColor: '#0b1424', titleColor: '#fbbf24', bodyColor: '#e4e7ef',
            callbacks: {
              label: c => {
                const v = c.raw;
                const s = v >= 0 ? '+' : '';
                return '  ' + c.dataset.label + ': ' + s + v.toFixed(1) + '만원';
              },
              afterBody: items => {
                const note = events[items[0].dataIndex]?.note;
                return note ? ['', '📌 ' + note] : [];
              }
            }
          }
        },
        scales: {
          x: { ticks: { color: '#6b7280', font: { size: 9 }, maxRotation: 45 }, grid: { color: '#1e2a44' } },
          y: {
            ticks: { color: '#6b7280', callback: v => (v >= 0 ? '+' : '') + v + '만' },
            grid: { color: '#1e2a44' }
          }
        }
      },
      plugins: [notePlugin]
    });

    const sign = v => v >= 0 ? '+' : '';
    const col = last.total >= 0 ? '#fbbf24' : '#f87171';
    document.getElementById('returnNote').innerHTML =
      '원금 1,000만원 기준  ·  ' +
      '최신 <b style="color:' + col + '">' + sign(last.total) + last.total.toFixed(0) + '만원</b>  (' + last.date + ')  ·  ' +
      '<b style="color:#e57373">🇰🇷 ' + sign(last.kr) + last.kr.toFixed(0) + '만</b>  ·  ' +
      '<b style="color:#7cc88a">🇺🇲 ' + sign(last.us) + last.us.toFixed(0) + '만</b>  ·  ' +
      '<span style="color:#6b7280">최고점: ' + peak.date + ' +' + peak.total.toFixed(0) + '만</span>';

  } catch(e) {
    document.getElementById('err').innerHTML = '<div class="err">⚠️ 오류: ' + e.message + '</div>';
    console.error(e);
  }
});
</script>
</body>
</html>
