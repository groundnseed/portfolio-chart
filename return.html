<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans KR','Malgun Gothic',sans-serif; background:#0b1220; color:#e4e7ef; padding:14px; }
  .card { background:#111a2d; border:1px solid #1e2a44; border-radius:14px; padding:16px 18px 20px; }
  .err { background:#3b1d24; color:#ff9b9b; padding:12px; border-radius:8px; font-size:13px; margin-top:8px; }
</style>
</head>
<body>
<div class="card">
  <div style="font-size:14px;font-weight:700;color:#b8c5dc;margin-bottom:10px;text-align:center;">
    Jin&#39;s Portfolio 누적 수익률 <span style="color:#6b7280;font-size:11px;font-weight:400;">(각 변동일 종가 기준 포지션 가중)</span>
  </div>
  <div style="position:relative;height:480px;"><canvas id="returnChart"></canvas></div>
  <div style="text-align:center;color:#6b7280;font-size:11px;margin-top:6px;" id="returnNote">
    💡 기준가 = 거래일 시가×0.5 + 종가×0.5
  </div>
</div>
<div id="err"></div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  try {
    if (typeof Chart === 'undefined') throw new Error('Chart.js 로드 실패');
    if (typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);

    const returnEvents = [
      { date:"3/10", totalReturn:-1.49, krReturn:-2.42, usReturn:0.38 },
      { date:"3/17", totalReturn:-0.43, krReturn:0.01,  usReturn:-1.76 },
      { date:"3/19", totalReturn:4.98,  krReturn:5.46,  usReturn:3.46 },
      { date:"3/20", totalReturn:3.67,  krReturn:5.63,  usReturn:-1.86 },
      { date:"3/22", totalReturn:-1.55, krReturn:-2.06, usReturn:-0.09 },
      { date:"3/23", totalReturn:-1.13, krReturn:-1.68, usReturn:-0.09 },
      { date:"3/25", totalReturn:1.94,  krReturn:0.74,  usReturn:4.22 },
      { date:"3/26", totalReturn:-1.42, krReturn:0.26,  usReturn:-4.32 },
      { date:"3/27", totalReturn:-3.26, krReturn:-2.35, usReturn:-4.49 },
      { date:"3/29", totalReturn:-5.01, krReturn:-2.1,  usReturn:-9.51 },
      { date:"3/31", totalReturn:-4.13, krReturn:-5.43, usReturn:-1.6 },
      { date:"4/3",  totalReturn:4.58,  krReturn:5.67,  usReturn:3.17 },
      { date:"4/5",  totalReturn:3.27,  krReturn:3.33,  usReturn:3.17 },
      { date:"4/7",  totalReturn:2.91,  krReturn:0.26,  usReturn:6.04 },
      { date:"4/8",  totalReturn:8.67,  krReturn:4.13,  usReturn:16.6 },
      { date:"4/9",  totalReturn:7.89,  krReturn:3.2,   usReturn:13.1 },
      { date:"4/10", totalReturn:8.62,  krReturn:5.02,  usReturn:12.29 },
      { date:"4/12", totalReturn:8.55,  krReturn:3.74,  usReturn:12.94 },
      { date:"4/13", totalReturn:8.23,  krReturn:3.25,  usReturn:12.94 },
      { date:"4/14", totalReturn:8.16,  krReturn:4.75,  usReturn:11.32 },
      { date:"4/15", totalReturn:8.89,  krReturn:8.72,  usReturn:9.04 },
      { date:"4/16", totalReturn:13.42, krReturn:15.73, usReturn:11.08 },
      { date:"4/17", totalReturn:12.92, krReturn:13.5,  usReturn:12.34 },
      { date:"4/19", totalReturn:11.92, krReturn:13.38, usReturn:10.56 },
      { date:"4/21", totalReturn:13.3,  krReturn:17.21, usReturn:9.24 },
      { date:"4/22", totalReturn:14.98, krReturn:18.85, usReturn:10.88 },
      { date:"4/23", totalReturn:15.84, krReturn:20.52, usReturn:10.88 }
    ];

    new Chart(document.getElementById('returnChart').getContext('2d'), {
      type:'line',
      data:{
        labels: returnEvents.map(e=>e.date),
        datasets:[
          { label:'총 수익률',
            data:returnEvents.map(e=>e.totalReturn),
            borderColor:'#fbbf24', backgroundColor:'rgba(251,191,36,0.15)',
            borderWidth:3, pointRadius:4, pointHoverRadius:7,
            pointBackgroundColor:'#fbbf24', pointBorderColor:'#0f1a2e', pointBorderWidth:2,
            fill:true, tension:0.3, order:3 },
          { label:'🇰🇷 한국',
            data:returnEvents.map(e=>e.krReturn),
            borderColor:'#e57373', backgroundColor:'transparent',
            borderWidth:2, pointRadius:2.5, pointHoverRadius:5, tension:0.3, order:2 },
          { label:'🇺🇲 미국',
            data:returnEvents.map(e=>e.usReturn),
            borderColor:'#7cc88a', backgroundColor:'transparent',
            borderWidth:2, pointRadius:2.5, pointHoverRadius:5, tension:0.3, order:1 }
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        layout:{ padding:{ top:28, right:20, left:6, bottom:6 } },
        plugins:{
          legend:{ display:true, position:'bottom',
            labels:{ color:'#b8c5dc', font:{size:11}, boxWidth:14, boxHeight:8 } },
          datalabels:{
            display: ctx => ctx.datasetIndex===0 && ctx.dataIndex===ctx.dataset.data.length-1,
            color:'#fbbf24', anchor:'end', align:'top', offset:6,
            font:{ size:12, weight:'700' },
            formatter: v => (v!=null ? ((v>=0?'+':'')+v.toFixed(2)+'%') : '—')
          },
          tooltip:{
            backgroundColor:'#0b1424', titleColor:'#fbbf24', bodyColor:'#e4e7ef',
            callbacks:{ label: c => '  '+c.dataset.label+': '+(c.raw!=null?(c.raw>=0?'+':'')+c.raw.toFixed(2)+'%':'—') }
          }
        },
        scales:{
          x:{ ticks:{ color:'#6b7280', font:{size:9}, maxRotation:45 }, grid:{ color:'#1e2a44' } },
          y:{ ticks:{ color:'#6b7280', callback:v=>(v>=0?'+':'')+v+'%' }, grid:{ color:'#1e2a44' } }
        }
      }
    });

    const last = returnEvents[returnEvents.length-1];
    document.getElementById('returnNote').innerHTML =
      '💡 기준가 = 거래일 시가×0.5 + 종가×0.5  ·  ' +
      '<b style="color:#fbbf24">전체 '+(last.totalReturn>=0?'+':'')+last.totalReturn.toFixed(2)+'%</b>  ·  ' +
      '<b style="color:#e57373">🇰🇷 '+(last.krReturn>=0?'+':'')+last.krReturn.toFixed(2)+'%</b>  ·  ' +
      '<b style="color:#7cc88a">🇺🇲 '+(last.usReturn>=0?'+':'')+last.usReturn.toFixed(2)+'%</b>  ·  ' +
      '<span style="color:#6b7280">기준일: '+last.date+' (4/23 이후 업데이트 필요)</span>';
  } catch(e) {
    document.getElementById('err').innerHTML = '<div class="err">⚠️ 오류: ' + e.message + '</div>';
    console.error(e);
  }
});
</script>
</body>
</html>
