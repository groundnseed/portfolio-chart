<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans KR','Malgun Gothic',sans-serif; background:#0b1220; color:#e4e7ef; padding:14px; }
  .card { background:#111a2d; border:1px solid #1e2a44; border-radius:14px; padding:16px 18px 20px; }
  .card-title { font-size:14px; font-weight:700; color:#b8c5dc; margin-bottom:10px; text-align:center; }
  .err { background:#3b1d24; color:#ff9b9b; padding:12px; border-radius:8px; font-size:13px; margin-top:8px; }
</style>
</head>
<body>
<div class="card">
  <div class="card-title" id="srTitle">종목별 현재 수익률 (6/19 기준)</div>
  <div style="overflow-x:auto;overflow-y:hidden;">
    <div style="position:relative;height:420px;min-width:900px;">
      <canvas id="srChart"></canvas>
    </div>
  </div>
</div>
<div id="err"></div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  try {
    if (typeof Chart === 'undefined') throw new Error('Chart.js 로드 실패');
    if (typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);
    const stockReturns = [
      { ticker:"KRX:069500", name:"KODEX 200",      market:"kr", pct:10.0, basisPrice:93065.0,    currentPrice:98000.0,  returnPct:5.3   },
      { ticker:"KRX:009150", name:"삼성전기",          market:"kr", pct:6.0,  basisPrice:518233.33,  currentPrice:788000.0, returnPct:52.06 },
      { ticker:"KRX:010060", name:"OCI홀딩스",         market:"kr", pct:5.0,  basisPrice:208242.86,  currentPrice:384000.0, returnPct:84.4  },
      { ticker:"KRX:000660", name:"SK하이닉스",         market:"kr", pct:5.5,  basisPrice:1053700.0,  currentPrice:1222000.0,returnPct:15.97 },
      { ticker:"KRX:005930", name:"삼성전자",           market:"kr", pct:4.0,  basisPrice:203000.0,   currentPrice:219500.0, returnPct:8.13  },
      { ticker:"KRX:105560", name:"KB금융",            market:"kr", pct:4.0,  basisPrice:158450.0,   currentPrice:157400.0, returnPct:-0.66 },
      { ticker:"KRX:034020", name:"두산에너빌리티",       market:"kr", pct:4.0,  basisPrice:108350.0,   currentPrice:127100.0, returnPct:17.31 },
      { ticker:"KRX:006800", name:"미래에셋증권",         market:"kr", pct:4.0,  basisPrice:69704.17,   currentPrice:66900.0,  returnPct:-4.02 },
      { ticker:"KRX:010120", name:"LS ELECTRIC",      market:"kr", pct:4.0,  basisPrice:186825.0,   currentPrice:226500.0, returnPct:21.24 },
      { ticker:"KRX:000720", name:"현대건설",            market:"kr", pct:3.0,  basisPrice:176583.33,  currentPrice:173000.0, returnPct:-2.03 },
      { ticker:"KRX:005380", name:"현대차",             market:"kr", pct:3.0,  basisPrice:540833.33,  currentPrice:513000.0, returnPct:-5.15 },
      { ticker:"NYSEARCA:IWM", name:"iShares Russell 2000", market:"us", pct:6.0, basisPrice:268.58, currentPrice:276.65, returnPct:3.0   },
      { ticker:"NASDAQ:INTC",  name:"Intel",           market:"us", pct:6.0,  basisPrice:55.3,       currentPrice:82.54,    returnPct:49.26 },
      { ticker:"NASDAQ:AVGO",  name:"Broadcom",        market:"us", pct:4.0,  basisPrice:386.34,     currentPrice:422.76,   returnPct:9.43  },
      { ticker:"NASDAQ:LRCX",  name:"Lam Research",   market:"us", pct:4.0,  basisPrice:236.25,     currentPrice:267.78,   returnPct:13.35 },
      { ticker:"NYSE:VRT",     name:"Vertiv",          market:"us", pct:4.0,  basisPrice:279.35,     currentPrice:323.46,   returnPct:15.79 },
      { ticker:"NYSE:C",       name:"Citigroup",       market:"us", pct:4.0,  basisPrice:127.67,     currentPrice:127.98,   returnPct:0.24  },
      { ticker:"NASDAQ:SNDK",  name:"SanDisk",         market:"us", pct:3.0,  basisPrice:763.12,     currentPrice:989.9,    returnPct:29.72 },
      { ticker:"NYSE:CAT",     name:"Caterpillar",     market:"us", pct:3.0,  basisPrice:785.06,     currentPrice:830.79,   returnPct:5.83  },
      { ticker:"NASDAQ:LITE",  name:"Lumentum",        market:"us", pct:3.0,  basisPrice:770.97,     currentPrice:881.64,   returnPct:14.35 },
      { ticker:"NASDAQ:GOOGL", name:"Alphabet",        market:"us", pct:2.0,  basisPrice:null,       currentPrice:344.4,    returnPct:0     }
    ];
    stockReturns.sort((a,b) => a.market!==b.market ? (a.market==='kr'?-1:1) : b.returnPct-a.returnPct);
    const lastKR = stockReturns.map(s=>s.market).lastIndexOf('kr');
    const srOverlay = {
      id:'srOverlay',
      afterDatasetsDraw(chart) {
        const ctx=chart.ctx, meta=chart.getDatasetMeta(0), area=chart.chartArea;
        if(!meta||!meta.data.length) return;
        const lb=meta.data[lastKR], rb=meta.data[lastKR+1];
        if(lb&&rb){ const dx=(lb.x+rb.x)/2;
          ctx.save(); ctx.strokeStyle='#4b5563'; ctx.lineWidth=1; ctx.setLineDash([5,5]);
          ctx.beginPath(); ctx.moveTo(dx,area.top); ctx.lineTo(dx,area.bottom); ctx.stroke(); ctx.restore(); }
      }
    };
    new Chart(document.getElementById('srChart').getContext('2d'), {
      type:'bar',
      data:{
        labels: stockReturns.map(s=>s.name),
        datasets:[{ label:'수익률',
          data: stockReturns.map(s=>s.returnPct),
          backgroundColor: stockReturns.map(s => s.returnPct>=0 ? (s.market==='kr'?'#e57373':'#7cc88a') : (s.market==='kr'?'#a04545':'#4a7a52')),
          borderRadius:3, maxBarThickness:45, categoryPercentage:0.8, barPercentage:1.0
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        layout:{ padding:{ top:30, right:10, left:6, bottom:6 } },
        plugins:{
          legend:{ display:false },
          datalabels:{ color:'#e4e7ef', anchor:'end',
            align: ctx => ctx.raw>=0?'top':'bottom', offset:2,
            font:{ size:10, weight:'700' },
            formatter: v => (v>=0?'+':'')+v.toFixed(1)+'%' },
          tooltip:{ backgroundColor:'#0b1424', titleColor:'#fbbf24', bodyColor:'#e4e7ef',
            callbacks:{ label: c => {
              const s=stockReturns[c.dataIndex];
              const arr=['수익률: '+(s.returnPct>=0?'+':'')+s.returnPct.toFixed(2)+'%'];
              if(s.basisPrice) arr.push('기준가: '+s.basisPrice.toLocaleString());
              if(s.currentPrice) arr.push('현재가: '+s.currentPrice.toLocaleString());
              arr.push('비중: '+s.pct.toFixed(1)+'%');
              return arr;
            }}}
        },
        scales:{
          x:{ ticks:{ color:'#b8c5dc', font:{size:10}, maxRotation:45, minRotation:45, autoSkip:false }, grid:{ display:false } },
          y:{ ticks:{ color:'#6b7280', callback:v=>(v>=0?'+':'')+v+'%' }, grid:{ color:'#1e2a44' } }
        }
      },
      plugins:[srOverlay]
    });
    const valid=stockReturns.filter(s=>s.basisPrice&&s.currentPrice&&s.pct>0);
    const tw=valid.reduce((s,x)=>s+x.pct,0);
    const wr=tw>0 ? valid.reduce((s,x)=>s+x.pct*x.returnPct,0)/tw : 0;
    const col=wr>=0?'#7cc88a':'#e57373';
    document.getElementById('srTitle').innerHTML =
      '종목별 현재 수익률 (6/19, '+stockReturns.length+'종목) ' +
      '<span style="color:'+col+';font-size:18px;font-weight:800;margin-left:8px;">총 '+(wr>=0?'+':'')+wr.toFixed(2)+'%</span>';
  } catch(e) {
    document.getElementById('err').innerHTML = '<div class="err">⚠️ 오류: ' + e.message + '</div>';
    console.error(e);
  }
});
</script>
</body></html>
