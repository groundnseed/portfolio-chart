<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans KR','Malgun Gothic',sans-serif; background:#0b1220; color:#e4e7ef; padding:14px; }
  .card { background:#111a2d; border:1px solid #1e2a44; border-radius:14px; padding:16px 18px 20px; }
  .card-title { font-size:14px; font-weight:700; color:#b8c5dc; margin-bottom:3px; text-align:center; }
  .card-sub { font-size:10.5px; color:#4b5563; text-align:center; margin-bottom:12px; }
</style>
</head>
<body>
<div class="card">
  <div class="card-title">종목별 현재 수익률</div>
  <div class="card-sub">공지일 익일 시가+종가 ÷ 2 · 가중평균 매수가 기준 · 7/8 반영</div>
  <div style="position:relative;height:510px;">
    <canvas id="srChart"></canvas>
  </div>
</div>
<script>
if (typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);

const stocks = [
  { name:'삼성전기',   m:'kr', buy:703917,  cur:1526000, r:116.8 },
  { name:'SK하이닉스', m:'kr', buy:1656944, cur:2076000, r:25.3  },
  { name:'LS Electric',m:'kr', buy:146900,  cur:183500,  r:25.0  },
  { name:'삼성전자',   m:'kr', buy:256719,  cur:277500,  r:8.1   },
  { name:'KB금융',     m:'kr', buy:155575,  cur:170100,  r:9.3   },
  { name:'삼성증권',   m:'kr', buy:123050,  cur:107900,  r:-12.3 },
  { name:'SNDK',  m:'us', buy:824.90,   cur:1727.18, r:109.4 },
  { name:'INTC',  m:'us', buy:73.56,    cur:110.24,  r:49.9  },
  { name:'LRCX',  m:'us', buy:277.23,   cur:326.13,  r:17.6  },
  { name:'DDOG',  m:'us', buy:232.63,   cur:261.09,  r:12.2  },
  { name:'CAT',   m:'us', buy:855.71,   cur:948.08,  r:10.8  },
  { name:'IWM',   m:'us', buy:281.13,   cur:293.48,  r:4.4   },
  { name:'GEV',   m:'us', buy:1069.55,  cur:1070.99, r:0.1   },
  { name:'AMAT',  m:'us', buy:597.62,   cur:593.50,  r:-0.7  },
  { name:'CSCO',  m:'us', buy:118.15,   cur:113.82,  r:-3.7  },
  { name:'GS',    m:'us', buy:1088.17,  cur:1028.01, r:-5.5  },
  { name:'BE',    m:'us', buy:328.91,   cur:254.29,  r:-22.7 },
];

stocks.sort((a,b) => b.r - a.r);

const labels = stocks.map(s => (s.m==='kr'?'🇰🇷':'🇺🇸') + ' ' + s.name);
const values = stocks.map(s => s.r);

const colors = stocks.map(s => {
  if (s.r < 0) return 'rgba(239,68,68,0.78)';
  if (s.m === 'kr') return s.r > 50 ? 'rgba(249,115,22,0.90)' : 'rgba(229,115,115,0.85)';
  return s.r > 50 ? 'rgba(99,179,237,0.92)' : 'rgba(91,141,238,0.85)';
});

const ctx = document.getElementById('srChart').getContext('2d');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels,
    datasets: [{
      data: values,
      backgroundColor: colors,
      borderWidth: 0,
      borderRadius: 4,
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    layout: { padding: { right: 68, left: 4 } },
    plugins: {
      legend: { display: false },
      datalabels: {
        anchor: ctx => ctx.dataset.data[ctx.dataIndex] >= 0 ? 'end' : 'start',
        align: ctx => ctx.dataset.data[ctx.dataIndex] >= 0 ? 'right' : 'left',
        color: '#e2e8f0',
        font: { size: 11, weight: '700' },
        formatter: (val) => (val > 0 ? '+' : '') + val.toFixed(1) + '%',
      },
      tooltip: {
        callbacks: {
          label: (ctx) => {
            const s = stocks[ctx.dataIndex];
            const isKr = s.m === 'kr';
            const buyStr = isKr ? s.buy.toLocaleString() + '원' : '$' + s.buy.toFixed(2);
            const curStr = isKr ? s.cur.toLocaleString() + '원' : '$' + s.cur.toFixed(2);
            return [
              ' 수익률: ' + (s.r >= 0 ? '+' : '') + s.r.toFixed(1) + '%',
              ' 매수가(가중평균): ' + buyStr,
              ' 현재가: ' + curStr,
            ];
          },
          title: (items) => labels[items[0].dataIndex]
        },
        backgroundColor: 'rgba(15,25,50,0.95)',
        titleColor: '#e2e8f0',
        bodyColor: '#94a3b8',
        borderColor: '#1e2a44',
        borderWidth: 1,
        padding: 10,
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(255,255,255,0.05)' },
        ticks: { color:'#6b7280', font:{size:10}, callback: v => v+'%' },
      },
      y: {
        grid: { display: false },
        ticks: { color:'#cbd5e1', font:{size:11.5}, padding:4 },
      }
    }
  }
});
</script>
</body>
</html>
