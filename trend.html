<style>

  .card { background:#111a2d; border:1px solid #1e2a44; border-radius:14px; padding:16px 18px 20px; }
  .card-title { font-size:14px; font-weight:700; color:#b8c5dc; margin-bottom:10px; text-align:center; }
  .err { background:#3b1d24; color:#ff9b9b; padding:12px; border-radius:8px; font-size:13px; margin-top:8px; }
</style>
</head>
<body>

<div id="err"></div>

      { date:'7/5',  kr:30.0, us:50.0, total:80.0 },
      { date:'7/6',  kr:22.0, us:42.0, total:64.0, callout:{ text:'7/6\n재축소', dx:0, dy:-50 } },
      { date:'7/7',  kr:14.5, us:42.0, total:56.5 },
      { date:'7/8',  kr:14.5, us:29.0, total:43.5, callout:{ text:'7/8\n총 43.5%', dx:0, dy:-50 } }
    ];
    const trendMarkers = {
      id:'trendMarkers',
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        const meta = chart.getDatasetMeta(0);
        if (!meta || !meta.data.length) return;
        const yScale = chart.scales.y;
        events.forEach((e, i) => {
          if (!e.callout) return;
          const p = meta.data[i];
          if (!p) return;
          const co = e.callout;
          ctx.save();
          ctx.beginPath();
          ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
          ctx.fillStyle = '#fbbf24';
          ctx.fill();
          ctx.strokeStyle = '#0b1424'; ctx.lineWidth = 1.5; ctx.stroke();
          const lines = co.text.split('\n');
          const lineH = 12;
          let bx, by;
          if (co.targetDate) {
            const ti = events.findIndex(ev => ev.date === co.targetDate);
            bx = ti >= 0 ? meta.data[ti].x : p.x;
            by = yScale.getPixelForValue(co.targetY ?? e.total);
          } else {
            bx = p.x + (co.dx||0);
            by = p.y + (co.dy||-40);
          }
          ctx.font = 'bold 10px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
          lines.forEach((line, j) => {
            const y = by + j * lineH;
            ctx.strokeStyle = 'rgba(11,20,36,0.85)'; ctx.lineWidth = 3; ctx.strokeText(line, bx, y);
            ctx.fillStyle = j===0 ? '#fbbf24' : '#e4e7ef'; ctx.fillText(line, bx, y);
          });
          ctx.restore();
        });
      }
    };
    new Chart(document.getElementById('trendChart').getContext('2d'), {
      type:'line',
      data:{
        labels: events.map(e=>e.date),
        datasets:[
          { label:'총 주식비중', data:events.map(e=>e.total), borderColor:'#5ba3f5', backgroundColor:'rgba(91,163,245,0.10)', borderWidth:2.6, pointRadius:2.5, pointHoverRadius:5, fill:true, tension:0.25, order:3 },
          { label:'🇰🇷 한국',    data:events.map(e=>e.kr),    borderColor:'#e57373', backgroundColor:'transparent', borderWidth:2, pointRadius:2, pointHoverRadius:4, tension:0.25, order:2 },
          { label:'🇺🇲 미국',    data:events.map(e=>e.us),    borderColor:'#7cc88a', backgroundColor:'transparent', borderWidth:2, pointRadius:2, pointHoverRadius:4, tension:0.25, order:1 }
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        layout:{ padding:{ top:70, right:20, left:6, bottom:6 } },
        interaction:{ mode:'index', intersect:false, axis:'x' },
        plugins:{
          legend:{ display:true, position:'bottom', labels:{ color:'#b8c5dc', font:{size:11}, boxWidth:14, boxHeight:8 } },
          datalabels:{ display:false },
          tooltip:{
            backgroundColor:'#0b1424', titleColor:'#fbbf24', bodyColor:'#e4e7ef',
            borderColor:'#fbbf24', borderWidth:1, padding:10,
            callbacks:{
              title: items => items[0].label,
              label: c => '  ' + c.dataset.label + ': ' + c.raw.toFixed(1) + '%',
              afterBody: items => {
                const ev = events[items[0].dataIndex];
                if (!ev?.callout) return '';
                return ['', '📌 ' + ev.callout.text.replace(/\n/g,' · ')];
              }
            }
          }
        },
        scales:{
          x:{ ticks:{ color:'#6b7280', font:{size:9}, maxRotation:45 }, grid:{ color:'#1e2a44' } },
          y:{ ticks:{ color:'#6b7280', callback:v=>v+'%' }, grid:{ color:'#1e2a44' }, beginAtZero:true }
        }
      },
      plugins:[trendMarkers]
    });
  } catch(e) {
    document.getElementById('err').innerHTML = '<div class="err">⚠️ 오류: ' + e.message + '</div>';
    console.error(e);
  }
});
</script>
</body></html>
