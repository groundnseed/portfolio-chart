<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans KR','Malgun Gothic',sans-serif; background:#0b1220; color:#e4e7ef; padding:14px; }
  .card { background:#111a2d; border:1px solid #1e2a44; border-radius:14px; padding:16px 18px 20px; }
  .card-title { font-size:14px; font-weight:700; color:#b8c5dc; margin-bottom:10px; text-align:center; }
  .err { background:#3b1d24; color:#ff9b9b; padding:12px; border-radius:8px; font-size:13px; margin-top:8px; }
</style>
</head>
<body>
<div class="card" style="padding:18px 20px 24px;">
  <div class="card-title">📈 종목별 개별 차트 (주가 · 비중 · 수익률)</div>
  <div style="font-size:11px;color:#4b5563;margin-bottom:14px;">
    분홍=주가 &nbsp;|&nbsp; <span style="color:#5b8dee">■ 파랑=비중%</span> &nbsp;|&nbsp;
    <span style="color:#34d399">■ 초록=누적수익%</span> &nbsp;|&nbsp;
    <span style="color:#ef4444">●</span> 빨간점=매매이벤트
    <span style="float:right;color:#374151" id="sgBuild"></span>
  </div>
  <div id="stockGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;"></div>
</div>
<div id="err"></div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  try {
    if (typeof Chart === 'undefined') throw new Error('Chart.js 로드 실패');
    if (typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);
    (function() {
      const SG = {"삼성전기":{"ticker":"009150.KS","market":"kr","flag":"🇰🇷","returnPct":248.3,"profit":1725,"currentPct":12.0,"weights":[["3/10",2],["3/17",4],["3/27",6],["4/14",6],["4/27",6],["6/16",6],["6/19",12]]},"SNDK":{"ticker":"SNDK","market":"us","flag":"🇺🇸","returnPct":146.6,"profit":490,"currentPct":3.0,"weights":[["3/10",1],["3/17",2],["3/27",3],["4/27",3],["6/16",3]]},"INTC":{"ticker":"INTC","market":"us","flag":"🇺🇸","returnPct":111.5,"profit":594,"currentPct":5.0,"weights":[["3/10",1],["3/17",2],["4/14",4],["4/27",5],["6/16",5]]},"SK하이닉스":{"ticker":"000660.KS","market":"kr","flag":"🇰🇷","returnPct":99.4,"profit":707,"currentPct":9.0,"weights":[["3/10",2],["3/17",4],["4/14",4],["4/27",4],["6/16",5.5],["6/17",6.5],["6/19",9]]},"LRCX":{"ticker":"LRCX","market":"us","flag":"🇺🇸","returnPct":53.5,"profit":369,"currentPct":6.0,"weights":[["3/10",2],["3/17",4],["4/8",6],["4/27",6],["6/16",6]]},"삼성전자":{"ticker":"005930.KS","market":"kr","flag":"🇰🇷","returnPct":47.3,"profit":394,"currentPct":8.0,"weights":[["3/10",2],["3/24",4],["4/27",6],["6/16",6],["6/19",8]]},"AMAT":{"ticker":"AMAT","market":"us","flag":"🇺🇸","returnPct":22.5,"profit":75,"currentPct":3.0,"weights":[["4/14",2],["4/27",2],["6/16",2],["6/19",3]]},"ARM":{"ticker":"ARM","market":"us","flag":"🇺🇸","returnPct":32.1,"profit":108,"currentPct":3.0,"weights":[["3/17",2],["4/27",3],["6/16",3]]},"IWM":{"ticker":"IWM","market":"us","flag":"🇺🇸","returnPct":18.4,"profit":102,"currentPct":6.0,"weights":[["4/8",5],["4/27",5],["6/16",5],["6/19",6]]},"KB금융":{"ticker":"105560.KS","market":"kr","flag":"🇰🇷","returnPct":38.2,"profit":182,"currentPct":4.0,"weights":[["3/10",2],["4/14",4],["6/16",4]]},"MRVL":{"ticker":"MRVL","market":"us","flag":"🇺🇸","returnPct":15.3,"profit":51,"currentPct":3.0,"weights":[["4/27",3],["6/16",3]]},"현대차":{"ticker":"005380.KS","market":"kr","flag":"🇰🇷","returnPct":12.1,"profit":41,"currentPct":3.0,"weights":[["3/17",2],["4/27",3],["6/16",3]]}};
      function sgDate(s){ const[m,d]=s.split('/').map(Number); return new Date(2026,m-1,d); }
      function sgWt(ws,t){ let w=0; for(const[ds,p]of ws){ if(sgDate(ds)<=t)w=p; else break; } return w; }
      const grid=document.getElementById('stockGrid');
      if(!grid) return;
      const kst=new Date(Date.now()+(new Date().getTimezoneOffset()+540)*60000);
      const bi=document.getElementById('sgBuild');
      if(bi) bi.textContent='빌드: '+kst.getFullYear()+'-'+String(kst.getMonth()+1).padStart(2,'0')+'-'+String(kst.getDate()).padStart(2,'0')+' KST';
      Object.entries(SG).forEach(([name,s])=>{
        const el=document.createElement('div');
        el.style.cssText='background:#0b1424;border:1px solid #1a2340;border-radius:10px;padding:10px 12px 12px;';
        const col=s.returnPct>=0?'#34d399':'#f87171';
        const sign=s.returnPct>=0?'+':'';
        el.innerHTML='<div style="display:flex;align-items:baseline;gap:5px;margin-bottom:4px;flex-wrap:wrap;">'+
          '<span>'+s.flag+'</span>'+
          '<span style="font-size:13px;font-weight:700;color:#e2e8f0;">'+name+'</span>'+
          '<span style="font-size:10px;color:#6b7280;">'+s.currentPct+'% / '+sign+s.returnPct+'%</span>'+
          '<span style="font-size:12px;font-weight:700;color:'+col+';margin-left:auto;">'+(s.profit>=0?'+':'')+s.profit.toLocaleString()+'만</span>'+
          '</div><div style="position:relative;height:140px;">'+
          '<div id="sg-l-'+name+'" style="color:#374151;font-size:10px;text-align:center;padding:55px 0;">로딩 중...</div>'+
          '<canvas id="sg-c-'+name+'" style="display:none;"></canvas></div>';
        grid.appendChild(el);
      });
      let _prices=null;
      async function loadPrices(){
        if(_prices) return _prices;
        try{ const r=await fetch('./prices.json?_='+Date.now()); _prices=await r.json(); }
        catch(e){ _prices={stocks:{}}; }
        return _prices;
      }
      async function sgRender(name,s){
        const data=await loadPrices();
        const sd=data.stocks?.[name];
        let pm=sd?.prices||{};
        if(sd){ s.returnPct=sd.returnPct??s.returnPct; s.currentPrice=sd.currentPrice??s.currentPrice; }
        const ld=document.getElementById('sg-l-'+name), cv=document.getElementById('sg-c-'+name);
        if(!ld||!cv) return;
        if(!Object.keys(pm).length){ ld.textContent='데이터 없음'; return; }
        ld.style.display='none'; cv.style.display='block';
        const ents=Object.entries(pm).sort((a,b)=>{
          const[am,ad]=a[0].split('/').map(Number),[bm,bd]=b[0].split('/').map(Number);
          return(am*100+ad)-(bm*100+bd);
        });
        const labels=ents.map(e=>e[0]), prices=ents.map(e=>e[1]), basis=prices[0];
        const weights=ents.map(([ds])=>sgWt(s.weights,sgDate(ds)));
        const returns=prices.map(p=>((p-basis)/basis*100));
        const td=new Set(s.weights.map(w=>w[0]));
        new Chart(cv.getContext('2d'),{
          data:{ labels, datasets:[
            {type:'line',data:prices,yAxisID:'yP',borderColor:'#ec4899',borderWidth:1.5,pointRadius:0,tension:0.2,fill:false},
            {type:'line',data:weights,yAxisID:'yW',borderColor:'#5b8dee',borderWidth:2,
              pointRadius:labels.map(l=>td.has(l)?5:0),
              pointBackgroundColor:labels.map(l=>td.has(l)?'#ef4444':'transparent'),
              pointBorderColor:labels.map(l=>td.has(l)?'#ef4444':'transparent'),
              stepped:'before',fill:false},
            {type:'line',data:returns,yAxisID:'yR',borderColor:'#34d399',borderWidth:1.5,pointRadius:0,tension:0.2,fill:false}
          ]},
          options:{
            responsive:true, maintainAspectRatio:false, animation:false,
            plugins:{ datalabels:{display:false}, legend:{display:false},
              tooltip:{ mode:'index', intersect:false, backgroundColor:'#0b1424', titleColor:'#fbbf24', bodyColor:'#e4e7ef',
                callbacks:{ label:c=>{
                  if(c.datasetIndex===0) return '주가 '+(c.raw?.toLocaleString()||'');
                  if(c.datasetIndex===1) return '비중 '+c.raw+'%';
                  return '수익 '+(c.raw>=0?'+':'')+c.raw?.toFixed(1)+'%';
                }}}},
            scales:{
              x:{ticks:{color:'#374151',font:{size:8},maxTicksLimit:5,maxRotation:0},grid:{display:false}},
              yP:{position:'left',ticks:{color:'#6b7280',font:{size:8},maxTicksLimit:4,callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v.toFixed(0)},grid:{color:'#111827'}},
              yW:{position:'right',ticks:{color:'#5b8dee',font:{size:8},maxTicksLimit:4,callback:v=>v+'%'},grid:{display:false}},
              yR:{position:'right',display:false}
            }
          }
        });
      }
      (async()=>{
        const ents=Object.entries(SG);
        for(let i=0;i<ents.length;i+=3)
          await Promise.all(ents.slice(i,i+3).map(([n,s])=>sgRender(n,s)));
      })();
    })();
  } catch(e) {
    document.getElementById('err').innerHTML = '<div class="err">⚠️ 오류: ' + e.message + '</div>';
    console.error(e);
  }
});
</script>
</body></html>
